# Regression gate — runs the unified regression suite (hardhat-smoke + k6 +
# RIT 2WP) against a build-from-SHA topology and gates on the machine-readable
# verdict.
#
# Trigger model (scope decision 2026-06-10): same-repo `workflow_dispatch`
# only. You supply the rskj + powpeg-node commit SHAs to test; the build-from-
# SHA mode compiles them and the driver runs the `full` preset. Cross-repo
# `*-rc` triggers from rsksmart/rskj + rsksmart/powpeg-node (via
# repository_dispatch) and PR comment-back on those repos are a documented
# follow-up — see docs/ci-regression-gate.md — because they need org
# permissions and coordination this same-repo workflow deliberately avoids.
name: regression-gate

on:
  workflow_dispatch:
    inputs:
      rskj_sha:
        description: "rskj commit SHA / branch / tag to build and test"
        required: true
        type: string
      powpeg_sha:
        description: "powpeg-node commit SHA / branch / tag to build and test"
        required: true
        type: string
      preset:
        description: "Driver preset to run"
        required: false
        default: "full"
        type: string

concurrency:
  # One regression run per SHA pair at a time; newer dispatches cancel older.
  group: regression-${{ inputs.rskj_sha }}-${{ inputs.powpeg_sha }}
  cancel-in-progress: true

jobs:
  regression:
    runs-on: ubuntu-latest
    # The gating preset target is < 30 min (soft). build-from-SHA of rskj +
    # powpeg dominates; the cache makes re-runs of the same SHAs fast.
    timeout-minutes: 90
    env:
      RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}
      # The three suites the `full` preset must produce — the gate fails
      # loss-lessly if any is absent from the report.
      EXPECTED_SUITES: "hardhat-smoke,k6:eth_blockNumber,rit-2wp-smoke"
    steps:
      - name: Checkout rskj-regression
        uses: actions/checkout@v6

      - name: Set up Node 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install bitcoind 0.18.1
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/bitcoin.tar.gz \
            https://bitcoincore.org/bin/bitcoin-core-0.18.1/bitcoin-0.18.1-x86_64-linux-gnu.tar.gz
          tar -xzf /tmp/bitcoin.tar.gz -C /tmp
          echo "BITCOIND_BIN_PATH=/tmp/bitcoin-0.18.1/bin/bitcoind" >> "$GITHUB_ENV"
          /tmp/bitcoin-0.18.1/bin/bitcoind -version | head -1

      # A GitHub Actions runner cannot ANONYMOUSLY clone rsksmart/rskj-hardhat-tests
      # or rskj-k6-tests: both answer an unauthenticated request with HTTP 401
      # (Basic realm="GitHub"), and the runner's built-in GITHUB_TOKEN is scoped to
      # this repo only. Provide a SUITES_TOKEN secret (a token with read access to
      # those two repos) to authenticate the clones. See docs/ci-regression-gate.md.
      # (rootstock-integration-tests clones anonymously, HTTP 200 — no token.)
      - name: Require SUITES_TOKEN
        env:
          SUITES_TOKEN: ${{ secrets.SUITES_TOKEN }}
        run: |
          if [ -z "${SUITES_TOKEN}" ]; then
            echo "::error::SUITES_TOKEN secret is required: the runner cannot anonymously clone rsksmart/rskj-hardhat-tests + rskj-k6-tests (both return HTTP 401). See docs/ci-regression-gate.md."
            exit 1
          fi

      - name: Check out rskj-hardhat-tests (needs SUITES_TOKEN)
        uses: actions/checkout@v6
        with:
          repository: rsksmart/rskj-hardhat-tests
          token: ${{ secrets.SUITES_TOKEN }}
          path: _suites/rskj-hardhat-tests

      - name: Check out rskj-k6-tests (needs SUITES_TOKEN)
        uses: actions/checkout@v6
        with:
          repository: rsksmart/rskj-k6-tests
          token: ${{ secrets.SUITES_TOKEN }}
          path: _suites/rskj-k6-tests

      - name: Check out rootstock-integration-tests (public)
        uses: actions/checkout@v6
        with:
          repository: rsksmart/rootstock-integration-tests
          path: _suites/rootstock-integration-tests

      - name: Install k6 (for the k6 cherry-pick scenario)
        run: |
          set -euo pipefail
          curl -fsSL https://github.com/grafana/k6/releases/download/v0.50.0/k6-v0.50.0-linux-amd64.tar.gz \
            | tar -xz -C /tmp
          echo "/tmp/k6-v0.50.0-linux-amd64" >> "$GITHUB_PATH"

      - name: Install dependencies + build
        run: |
          npm ci
          npm run build

      - name: Run regression (build-from-SHA → full topology → suites)
        id: run
        continue-on-error: true
        run: |
          mkdir -p "reports/$RUN_ID"
          # The step runs under `bash -e`: a failing driver makes the pipe
          # return non-zero, which would abort the script BEFORE we capture the
          # exit code (leaving driver_exit empty and the gate blind to it). Run
          # the pipeline with -e off and capture the driver's real exit from
          # PIPESTATUS[0] (node's, not tee's), then hand it to the gate.
          set +e
          node bin/rskj-regression.js run "${{ inputs.preset }}" \
            --auto-node \
            --build-mode sha \
            --rskj-sha "${{ inputs.rskj_sha }}" \
            --powpeg-sha "${{ inputs.powpeg_sha }}" \
            --run-id "$RUN_ID" \
            --output-dir "reports/$RUN_ID" \
            --hardhat-tests-path "$GITHUB_WORKSPACE/_suites/rskj-hardhat-tests" \
            --k6-tests-path "$GITHUB_WORKSPACE/_suites/rskj-k6-tests" \
            --rit-tests-path "$GITHUB_WORKSPACE/_suites/rootstock-integration-tests" \
            2>&1 | tee "reports/$RUN_ID/driver.log"
          driver_exit=${PIPESTATUS[0]}
          set -e
          echo "driver_exit=$driver_exit" >> "$GITHUB_OUTPUT"
          echo "driver exited with code $driver_exit"

      - name: Gate on the machine-readable verdict
        id: gate
        run: |
          # Structured gate (4 hardening rules): artifact presence, loss-less
          # assembly, structured health (errored/failed counts, NOT log-grep),
          # process health (driver exit), and native-crash scan of the logs.
          node dist/src/ci/run-gate.js \
            --report "reports/$RUN_ID/report.json" \
            --logs-dir "reports/$RUN_ID" \
            --expect "$EXPECTED_SUITES" \
            --driver-exit "${{ steps.run.outputs.driver_exit }}" \
            --summary-file "$GITHUB_STEP_SUMMARY"

      - name: Upload report + logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-report-${{ env.RUN_ID }}
          path: reports/${{ env.RUN_ID }}/
          if-no-files-found: warn
